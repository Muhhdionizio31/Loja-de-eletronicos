<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração | Lojinha Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            padding: 40px 5%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fdfdfd;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); padding: 6px 12px; width: auto; font-size: 0.8rem; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Lista de Itens */
        .item-list {
            list-style: none;
            margin-top: 20px;
            border-top: 2px solid var(--bg);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .item-info b { font-size: 0.95rem; }
        .item-info span { font-size: 0.75rem; color: var(--text-muted); display: block; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h1>Painel Administrativo</h1>
            <p style="color: var(--text-muted)">Gerencie categorias e produtos da loja</p>
        </div>
        <a href="/" style="text-decoration: none; color: var(--primary); font-weight: 600;">
            <i class="fas fa-external-link-alt"></i> Ver Loja
        </a>
    </header>

    <div class="container">
        
        <section>
            <div class="card">
                <h2><i class="fas fa-folder-plus"></i> Nova Categoria</h2>
                <form action="/eletronico" method="POST">
                    <div class="form-group">
                        <label>Nome da Categoria</label>
                        <input type="text" name="nome" placeholder="Ex: Periféricos" required>
                    </div>
                    <button type="submit" class="btn btn-blue">Adicionar Categoria</button>
                </form>

                <div style="margin-top: 30px;">
                    <h3>Categorias Atuais</h3>
                    <ul class="item-list">
                        {% for cat in categorias %}
                        <li class="item-row">
                            <div class="item-info">
                                <b>{{ cat.nome }}</b>
                                <span>ID: {{ cat.id }}</span>
                            </div>
                            
                            <form action="/eletronico/{{ cat.id }}/deletar" method="POST">
                                <button type="submit" class="btn btn-red" 
                                        onclick="return confirm('Deseja excluir esta categoria e desvincular seus produtos?')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </li>
                        {% else %}
                        <p style="color: var(--text-muted); font-size: 0.85rem; padding: 20px 0;">Nenhuma categoria cadastrada.</p>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </section>

        <section>
            <div class="card">
                <h2><i class="fas fa-box-open"></i> Cadastrar Produto</h2>
                <form action="/produto/salvar" method="POST">
                    <div class="form-group">
                        <label>Nome do Produto</label>
                        <input type="text" name="nome" placeholder="Ex: Mouse Gamer RGB" required>
                    </div>

                    <div class="form-group">
                        <label>Categoria Relacionada</label>
                        <select name="eletronico_id" required>
                            <option value="" disabled selected>Vincular a uma categoria...</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id }}">{{ cat.nome }} (ID: {{ cat.id }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Descrição do Produto</label>
                        <textarea name="descricao" rows="5" placeholder="Descreva as especificações do item..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-green">
                        <i class="fas fa-check-circle"></i> Salvar Produto no Inventário
                    </button>
                </form>
            </div>
        </section>

    </div>

</body>
</html>
