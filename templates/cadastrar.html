<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Lojinha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            padding: 40px 5%;
        }

        .header { margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h2 { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 15px; }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            background: #f8fafc;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .cat-list {
            margin-top: 20px;
            list-style: none;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .cat-item {
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .id-badge {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-light);
        }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Painel de Cadastro</h1>
        <a href="/" style="text-decoration: none; color: var(--text-light); font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Voltar para Início
        </a>
    </div>

    <div class="grid">
        
        <section class="card">
            <h2><i class="fas fa-tags"></i> Nova Categoria</h2>
            
            <form action="/eletronico" method="POST">
                <div class="form-group">
                    <label>Nome do Eletrônico</label>
                    <input type="text" name="nome" placeholder="Ex: Celulares" required>
                </div>
                <button type="submit" class="btn btn-primary">Adicionar Categoria</button>
            </form>

            <div class="cat-list">
                <strong>Categorias no Banco:</strong>
                {% for cat in categorias %}
                <div class="cat-item">
                    <span>{{ cat.nome }}</span>
                    <span class="id-badge">ID: {{ cat.id }}</span>
                </div>
                {% else %}
                <p style="color: var(--text-light); font-size: 0.8rem; margin-top: 10px;">Nenhuma categoria encontrada.</p>
                {% endfor %}
            </div>
        </section>

        <section class="card">
            <h2><i class="fas fa-box"></i> Novo Produto</h2>
            
            <form action="/produto/salvar" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Nome do Produto</label>
                        <input type="text" name="nome" placeholder="Ex: iPhone 15" required>
                    </div>
                    <div class="form-group">
                        <label>Vincular Categoria</label>
                        <select name="eletronico_id" required>
                            <option value="" disabled selected>Selecione...</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id }}">{{ cat.nome }} (ID: {{ cat.id }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <textarea name="descricao" rows="4" placeholder="Detalhes técnicos do produto..."></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Salvar Produto
                </button>
            </form>
        </section>

    </div>

</body>
</html>
